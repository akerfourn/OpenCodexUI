appId: io.opencodexui.app
productName: OpenCodexUI

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../../prompt-commit.default.md
    to: prompt-commit.default.md
  - from: ../../prompt-commit.generation.md
    to: prompt-commit.generation.md

asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"

linux:
  icon: build/icon.png
  executableName: open-codex-ui
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Adrien Kerfourn <ak.sitecontact@gmail.com>

deb:
  packageName: open-codex-ui
  artifactName: open-codex-ui_${version}_${arch}.${ext}

mac:
  icon: build/icon.icns
  target:
    - dmg
  category: public.app-category.developer-tools

win:
  icon: build/icon.ico
  target:
    - nsis
