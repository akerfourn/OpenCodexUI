appId: io.opencodexui.app
productName: OpenCodexUI

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../../prompt-commit.default.md
    to: prompt-commit.default.md

asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"

linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  category: Development

mac:
  icon: build/icon.icns
  target:
    - dmg
  category: public.app-category.developer-tools

win:
  icon: build/icon.ico
  target:
    - nsis
